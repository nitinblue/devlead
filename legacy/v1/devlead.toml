[project]
name = "devlead"
docs_dir = "devlead_docs"

[kpis]
circles_warning = 50
ftr_minimum = 60
convergence_target = 80

[rollover]
trigger = "date"
day_of_month = 1
retain_months = 12
files = [
    "_project_tasks.md",
    "_intake_bugs.md",
    "_intake_features.md",
    "_intake_gaps.md",
    "_intake_changes.md",
]

[[gates]]
name = "memory-from-docs"
trigger = "Edit|Write"
path = "**/.claude/*/memory/**"
condition = "state_not_in(UPDATE, SESSION_END)"
action = "block"
message = "Memory must derive from devlead_docs. Transition to UPDATE first."

[[gates]]
name = "protect-docs"
trigger = "Edit|Write"
path = "**/devlead_docs/**"
condition = "state_not_in(UPDATE, SESSION_END)"
action = "warn"
message = "Editing devlead_docs outside UPDATE state."
