[project]
name = "{project_name}"
docs_dir = "claude_docs"

[kpis]
circles_warning = 50
ftr_minimum = 60
convergence_target = 80

[rollover]
trigger = "date"
day_of_month = 1
retain_months = 12
files = [
    "_project_tasks.md",
    "_intake_issues.md",
    "_intake_features.md",
]

[scope]
enforcement = "log"         # "log" = silent, "warn" = allow + warn, "block" = deny
auto_clear = true           # clear scope when leaving EXECUTE

[audit]
enabled = true
cross_project_policy = "log"    # "log" = silent, "warn" = allow + warn, "block" = deny

[hooks]
session_start = true
gate_edits = true
gate_plan_mode = true
gate_session_end = true
