[project]
name = "{project_name}"
docs_dir = "claude_docs"

[kpis]
circles_warning = 50
ftr_minimum = 60
convergence_target = 80

[rollover]
trigger = "date"
day_of_month = 1
retain_months = 12
files = [
    "_project_tasks.md",
    "_intake_bugs.md",
    "_intake_features.md",
    "_intake_gaps.md",
    "_intake_changes.md",
]

[hooks]
session_start = true
gate_edits = true
gate_plan_mode = true
gate_session_end = true
